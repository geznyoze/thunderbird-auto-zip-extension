<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: sans-serif; padding: 15px; margin: 0; background: #f9f9f9; }
    h3 { margin-top: 0; }
    .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    button { padding: 6px 12px; cursor: pointer; }
    .confirm { background: #0060df; color: white; border: none; border-radius: 4px; }
    .cancel { background: #e0e0e0; border: 1px solid #ccc; border-radius: 4px; }
  </style>
</head>
<body>
  <h3>Compress Large Attachments?</h3>
  <p>Your attachments exceed your specified limit of <b id="sizeLimit"> [sizeLimit] </b> MB. Would you like to compress them into ZIP files before sending?</p>
  <div class="actions">
    <button id="noBtn" class="cancel">Send As-Is</button>
    <button id="yesBtn" class="confirm">Zip & Send</button>
  </div>
  <script src="dialog.js"></script>
</body>
</html>
