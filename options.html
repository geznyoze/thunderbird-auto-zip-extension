<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { padding: 20px; font-family: sans-serif; }
    .setting-row { margin-bottom: 20px; }
    label { font-weight: bold; display: block; margin-bottom: 5px; }
    input[type="number"] { width: 80px; padding: 4px; }
    button { padding: 6px 12px; cursor: pointer; }
    #status { color: green; margin-left: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Auto ZIP Settings</h2>
  
  <div class="setting-row">
    <label for="sizeLimit">Combined attachment size limit before prompting (MB):</label>
    <input type="number" id="sizeLimit" min="0.1" step="0.1">
  </div>
  
  <button id="saveBtn">Save Settings</button>
  <span id="status"></span>

  <script src="options.js"></script>
</body>
</html>
